name: Publish Researcher Knowledge Pack

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Researcher Knowledge Pack semantic version, for example 2.2.0"
        required: true
        type: string
  push:
    tags:
      - "researcher-knowledge-pack-v*"

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve and validate version
        id: version
        env:
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            if [[ ! "${GITHUB_REF_NAME}" =~ ^researcher-knowledge-pack-v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
              echo "Unsupported Researcher Knowledge Pack release tag: ${GITHUB_REF_NAME}" >&2
              exit 1
            fi
            PACK_VERSION="${BASH_REMATCH[1]}"
            RELEASE_TAG="${GITHUB_REF_NAME}"
            EXPECTED_TAG="researcher-knowledge-pack-v${PACK_VERSION}"
            if [[ "${RELEASE_TAG}" != "${EXPECTED_TAG}" ]]; then
              echo "Release tag ${RELEASE_TAG} does not exactly equal ${EXPECTED_TAG}" >&2
              exit 1
            fi
            TAG_SHA="$(git rev-list -n 1 "${RELEASE_TAG}")"
            if [[ "${TAG_SHA}" != "${GITHUB_SHA}" ]]; then
              echo "Release tag ${RELEASE_TAG} points to ${TAG_SHA}, not workflow commit ${GITHUB_SHA}" >&2
              exit 1
            fi
            if ! git diff --quiet HEAD -- knowledge-packs/researcher tools/knowledge-packs tests/knowledge_packs .github/workflows/publish-researcher-knowledge-pack.yml; then
              echo "Tagged release inputs are not clean at ${GITHUB_SHA}" >&2
              exit 1
            fi
          else
            PACK_VERSION="${DISPATCH_VERSION}"
            if [[ -z "${PACK_VERSION}" ]]; then
              echo "Manual Researcher Knowledge Pack builds require a semantic version input." >&2
              exit 1
            fi
            if [[ "${PACK_VERSION}" =~ ^v ]]; then
              echo "Manual version input must be a bare semantic version without a leading v: ${PACK_VERSION}" >&2
              exit 1
            fi
            RELEASE_TAG="researcher-knowledge-pack-v${PACK_VERSION}"
          fi

          if [[ ! "${PACK_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid Researcher Knowledge Pack semantic version: ${PACK_VERSION}" >&2
            exit 1
          fi

          PACK_VERSION_LABEL="v${PACK_VERSION}"
          PACK_BASENAME="CIOS-Researcher-Knowledge-Pack-${PACK_VERSION_LABEL}"
          PACK_ZIP="dist/${PACK_BASENAME}.zip"
          PACK_REPORT="dist/${PACK_BASENAME}-build-report.md"
          PACK_CHECKSUM="dist/${PACK_BASENAME}.sha256"

          {
            echo "PACK_VERSION=${PACK_VERSION}"
            echo "PACK_VERSION_LABEL=${PACK_VERSION_LABEL}"
            echo "PACK_BASENAME=${PACK_BASENAME}"
            echo "PACK_ZIP=${PACK_ZIP}"
            echo "PACK_REPORT=${PACK_REPORT}"
            echo "PACK_CHECKSUM=${PACK_CHECKSUM}"
            echo "RELEASE_TAG=${RELEASE_TAG}"
          } | tee -a "$GITHUB_ENV" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "pytest>=8.0"

      - name: Run Researcher Knowledge Pack tests
        run: |
          pytest tests/knowledge_packs/test_researcher_pack.py

      - name: Build Researcher Knowledge Pack
        run: |
          python3 tools/knowledge-packs/build_researcher_pack.py \
            --version "$PACK_VERSION" \
            --output-dir dist

      - name: Validate generated version consistency
        run: |
          set -euo pipefail
          test -f "$PACK_ZIP"
          test -f "$PACK_REPORT"
          grep -F "Requested pack version: $PACK_VERSION" "$PACK_REPORT"
          python3 - <<'PY'
          import os, sys, zipfile
          version = os.environ['PACK_VERSION']
          basename = os.environ['PACK_BASENAME']
          forbidden = 'v2.1.0'
          with zipfile.ZipFile(os.environ['PACK_ZIP']) as z:
              names = z.namelist()
              if not names or not all(name.startswith(f'{basename}/') for name in names):
                  raise SystemExit(f'Archive root is not {basename}')
              allowed_history = ('CHANGELOG.md', 'MIGRATION.md')
              for name in names:
                  if name.rsplit('/', 1)[-1] in allowed_history:
                      continue
                  data = z.read(name)
                  if forbidden.encode() in data or b'CIOS-Researcher-Knowledge-Pack-v2.1.0' in data:
                      raise SystemExit(f'Generated operational output contains stale version in {name}')
          PY

      - name: Verify output and checksum
        run: |
          set -euo pipefail
          test -f "$PACK_ZIP"
          test -f "$PACK_REPORT"
          (
            cd dist
            sha256sum "$(basename "$PACK_ZIP")" > "$(basename "$PACK_CHECKSUM")"
            sha256sum --check "$(basename "$PACK_CHECKSUM")"
          )

      - name: Upload workflow artefacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACK_BASENAME }}
          path: |
            ${{ env.PACK_ZIP }}
            ${{ env.PACK_REPORT }}
            ${{ env.PACK_CHECKSUM }}
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        if: github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/researcher-knowledge-pack-v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          NOTES_FILE="dist/${PACK_BASENAME}-release-notes.md"
          {
            echo "Canonical CIOS Researcher Knowledge Pack ${PACK_VERSION_LABEL}."
            echo
            echo "- Previous version: see knowledge-packs/researcher/CHANGELOG.md."
            echo "- New version: ${PACK_VERSION_LABEL}."
            echo "- Validation status: passed."
            echo "- Build provenance: commit ${GITHUB_SHA}, ref ${GITHUB_REF}, workflow run ${GITHUB_RUN_ID}."
          } > "$NOTES_FILE"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$PACK_ZIP" "$PACK_REPORT" "$PACK_CHECKSUM" --clobber
          else
            gh release create "$RELEASE_TAG" "$PACK_ZIP" "$PACK_REPORT" "$PACK_CHECKSUM" \
              --title "CIOS Researcher Knowledge Pack ${PACK_VERSION_LABEL}" \
              --notes-file "$NOTES_FILE"
          fi
