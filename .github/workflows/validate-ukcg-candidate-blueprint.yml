name: Validate UKCG Candidate Blueprint

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  validate-ukcg-candidate-blueprint:
    name: Validate UKCG Candidate Blueprint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install governed dependencies
        run: python -m pip install -r requirements.txt

      - name: Verify Pydantic major version 2
        run: |
          python - <<'PY'
          import pydantic
          major = int(pydantic.__version__.split('.', 1)[0])
          if major != 2:
              raise SystemExit(f'Expected Pydantic major version 2, got {pydantic.__version__}')
          print(f'Pydantic {pydantic.__version__}')
          PY

      - name: Materialise UKCG Candidate Blueprint assets
        run: python tools/blueprints/materialise_ukcg.py

      - name: Build UK Government Blueprint package
        run: python tools/knowledge-packs/build_uk_government_blueprint_package.py

      - name: Verify UKCG Candidate Blueprint package governance
        run: |
          python - <<'PY'
          import hashlib
          import json
          import zipfile
          from pathlib import Path

          zip_path = Path('dist/UKCG-CDT-Flora-Blueprint-v1.0.zip')
          asset_root = Path('dist/uk-government-blueprint-assets')
          if not zip_path.is_file():
              raise SystemExit(f'Missing generated ZIP: {zip_path}')

          with zipfile.ZipFile(zip_path) as zf:
              names = set(zf.namelist())
              if 'blueprint_manifest.json' not in names:
                  raise SystemExit('blueprint_manifest.json is not at the ZIP root')
              manifest = json.loads(zf.read('blueprint_manifest.json'))

          expected_spine = 'twin_spine/UKCG-CDT-01-Twin-Spine-v1.0.xlsx'
          if manifest.get('final_twin_spine_workbook') != expected_spine:
              raise SystemExit(f'Unexpected Twin Spine: {manifest.get("final_twin_spine_workbook")}')

          declared = manifest.get('files', [])
          if not declared:
              raise SystemExit('Manifest declares no assets')
          for entry in declared:
              rel = entry['path']
              asset = asset_root / rel
              if not asset.is_file():
                  raise SystemExit(f'Manifest asset missing from materialised assets: {rel}')
              digest = hashlib.sha256(asset.read_bytes()).hexdigest()
              if digest != entry['sha256']:
                  raise SystemExit(f'Hash mismatch for {rel}: {digest} != {entry["sha256"]}')

          release_validation = json.loads((asset_root / 'metadata/UKCG-CDT-v1.0-Release-Validation.json').read_text())
          if release_validation.get('status') != 'Candidate':
              raise SystemExit(f'Candidate status not retained: {release_validation.get("status")}')
          if release_validation.get('canonical_mutations') != 0:
              raise SystemExit(f'canonical_mutations != 0: {release_validation.get("canonical_mutations")}')

          governed_twin = (asset_root / 'docs/UKCG-CDT-02-Governed-Commercial-Digital-Twin-v1.0.md').read_text()
          if 'Candidate / non-canonical' not in governed_twin:
              raise SystemExit('Candidate/non-canonical status was not retained')
          print('UKCG Candidate Blueprint package governance checks passed')
          PY

      - name: Run UKCG and Flora blueprint tests
        run: |
          python -m pytest \
            tests/blueprints/test_ukcg_materialisation.py \
            tests/test_flora_blueprint_import_validation.py \
            tests/test_flora_blueprint_import_registry.py

      - name: Perform isolated Flora receipt and staged validation
        run: |
          FLORA_DATA_DIR="$RUNNER_TEMP/flora-ukcg-validation" python - <<'PY'
          from pathlib import Path

          from cios.applications.flora.blueprint_import import BlueprintPackageRegistry, BlueprintPackageValidator

          zip_path = Path('dist/UKCG-CDT-Flora-Blueprint-v1.0.zip')
          receipt = BlueprintPackageRegistry().receive(zip_path.read_bytes(), zip_path.name, 'github-actions')
          result = BlueprintPackageValidator().validate_and_stage(receipt.package_ref, 'github-actions')
          if result.candidate_records_staged != 152:
              raise SystemExit(f'Unexpected candidate_records_staged: {result.candidate_records_staged}')
          if result.records_accepted_into_staging != 116:
              raise SystemExit(f'Unexpected records_accepted_into_staging: {result.records_accepted_into_staging}')
          if result.records_quarantined != 36:
              raise SystemExit(f'Unexpected records_quarantined: {result.records_quarantined}')
          if result.canonical_mutations != 0:
              raise SystemExit(f'Unexpected canonical_mutations: {result.canonical_mutations}')
          print(f'Validated receipt {receipt.import_run_id} with package {receipt.package_ref}')
          PY

      - name: Generate checksums
        run: |
          sha256sum \
            dist/UKCG-CDT-Flora-Blueprint-v1.0.zip \
            dist/uk-government-blueprint-assets/twin_spine/UKCG-CDT-01-Twin-Spine-v1.0.xlsx \
            dist/uk-government-blueprint-assets/docs/UKCG-CDT-04-Research-Completion-and-Validation-Report-v1.0.md \
            dist/uk-government-blueprint-assets/metadata/UKCG-CDT-v1.0-Release-Validation.json \
            > dist/ukcg-candidate-blueprint-checksums.sha256

      - name: Upload UKCG Candidate Blueprint artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ukcg-candidate-blueprint-validation
          if-no-files-found: error
          path: |
            dist/UKCG-CDT-Flora-Blueprint-v1.0.zip
            dist/uk-government-blueprint-assets/twin_spine/UKCG-CDT-01-Twin-Spine-v1.0.xlsx
            dist/uk-government-blueprint-assets/docs/UKCG-CDT-04-Research-Completion-and-Validation-Report-v1.0.md
            dist/uk-government-blueprint-assets/metadata/UKCG-CDT-v1.0-Release-Validation.json
            dist/ukcg-candidate-blueprint-checksums.sha256
