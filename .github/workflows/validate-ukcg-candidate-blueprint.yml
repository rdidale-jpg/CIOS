name: Validate UKCG Candidate Blueprint

on:
  pull_request:
    paths:
      - ".github/workflows/validate-ukcg-candidate-blueprint.yml"
      - "cios/**"
      - "tests/blueprints/test_ukcg_materialisation.py"
      - "tests/test_flora_blueprint_import_validation.py"
      - "tests/test_flora_blueprint_import_registry.py"
      - "tools/blueprints/materialise_ukcg.py"
      - "docs/industry-twins/uk-central-government/UKCG-CDT-00-Delivery-and-Input-Manifest-v1.0.md"
      - "docs/industry-twins/uk-central-government/Candidate-UK-Central-Government-Industry-Twin-Handover.md"
      - "tools/knowledge-packs/build_uk_government_blueprint_package.py"
      - "knowledge-packs/uk-government/**"
  push:
    branches:
      - main
      - work
    paths:
      - ".github/workflows/validate-ukcg-candidate-blueprint.yml"
      - "cios/**"
      - "tests/blueprints/test_ukcg_materialisation.py"
      - "tests/test_flora_blueprint_import_validation.py"
      - "tests/test_flora_blueprint_import_registry.py"
      - "tools/blueprints/materialise_ukcg.py"
      - "docs/industry-twins/uk-central-government/UKCG-CDT-00-Delivery-and-Input-Manifest-v1.0.md"
      - "docs/industry-twins/uk-central-government/Candidate-UK-Central-Government-Industry-Twin-Handover.md"
      - "tools/knowledge-packs/build_uk_government_blueprint_package.py"
      - "knowledge-packs/uk-government/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate UKCG Candidate Blueprint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install governed dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile CIOS package
        run: |
          PYTHONPATH=. python -m compileall -q cios

      - name: Run UKCG and Flora import tests
        run: |
          PYTHONPATH=. pytest -q \
            tests/blueprints/test_ukcg_materialisation.py \
            tests/test_flora_blueprint_import_validation.py \
            tests/test_flora_blueprint_import_registry.py

      - name: Materialise UKCG blueprint assets
        run: |
          rm -rf dist/uk-government-blueprint-assets
          rm -f dist/UKCG-CDT-Flora-Blueprint-v1.0.zip
          PYTHONPATH=. python tools/blueprints/materialise_ukcg.py \
            --input-file docs/industry-twins/uk-central-government/Candidate-UK-Central-Government-Industry-Twin-Handover.md \
            --output-dir dist/uk-government-blueprint-assets

      - name: Build UK Government blueprint package
        run: |
          PYTHONPATH=. python tools/knowledge-packs/build_uk_government_blueprint_package.py \
            --input-dir dist/uk-government-blueprint-assets \
            --output-dir dist

      - name: Validate isolated Flora receipt and staging counts
        run: |
          FLORA_DATA_DIR="${{ runner.temp }}/flora-blueprint-validation" PYTHONPATH=. python - <<'PY'
          from pathlib import Path

          from cios.applications.flora.blueprint_import import BlueprintPackageRegistry, BlueprintPackageValidator

          zip_path = next(Path("dist").glob("UKCG-CDT-*-Blueprint-*.zip"))
          receipt = BlueprintPackageRegistry().receive(zip_path.read_bytes(), zip_path.name, "github-actions")
          result = BlueprintPackageValidator().validate_and_stage(receipt.package_ref, "github-actions")
          expected = {
              "candidate_records_staged": 152,
              "records_accepted_into_staging": 116,
              "records_quarantined": 36,
              "records_rejected": 0,
              "canonical_mutations": 0,
          }
          actual = {key: getattr(result, key) for key in expected}
          if actual != expected:
              raise SystemExit(f"Unexpected Flora staging counts: {actual!r}")
          print(actual)
          PY

      - name: Upload UKCG Blueprint outputs
        uses: actions/upload-artifact@v4
        with:
          name: ukcg-blueprint-assets
          if-no-files-found: error
          path: |
            dist/uk-government-blueprint-assets/**
            dist/UKCG-CDT-Flora-Blueprint-v1.0.zip
