name: Validate UKCG Candidate Blueprint

on:
  pull_request:
    paths:
      - ".github/workflows/validate-ukcg-candidate-blueprint.yml"
      - "cios/applications/flora/**"
      - "docs/industry-twins/uk-central-government/**"
      - "pyproject.toml"
      - "requirements.txt"
      - "tests/blueprints/test_ukcg_materialisation.py"
      - "tests/test_flora_blueprint_import_validation.py"
      - "tools/blueprints/materialise_ukcg.py"
      - "tools/knowledge-packs/build_uk_government_blueprint_package.py"
  push:
    branches:
      - main
      - work
    paths:
      - ".github/workflows/validate-ukcg-candidate-blueprint.yml"
      - "cios/applications/flora/**"
      - "docs/industry-twins/uk-central-government/**"
      - "pyproject.toml"
      - "requirements.txt"
      - "tests/blueprints/test_ukcg_materialisation.py"
      - "tests/test_flora_blueprint_import_validation.py"
      - "tools/blueprints/materialise_ukcg.py"
      - "tools/knowledge-packs/build_uk_government_blueprint_package.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate UKCG Candidate Blueprint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install governed Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Confirm Pydantic compatibility
        run: |
          python - <<'PY'
          import pydantic
          major = int(pydantic.__version__.split('.', 1)[0])
          if major != 2:
              raise SystemExit(f"Expected Pydantic major version 2 from repository constraints, got {pydantic.__version__}")
          print(f"Pydantic {pydantic.__version__}")
          PY

      - name: Materialise UKCG Blueprint assets
        run: |
          python tools/blueprints/materialise_ukcg.py --output-dir dist/uk-government-blueprint-assets

      - name: Build Blueprint package
        run: |
          python tools/knowledge-packs/build_uk_government_blueprint_package.py \
            --input-dir dist/uk-government-blueprint-assets \
            --output-dir dist

      - name: Verify manifest asset hashes
        run: |
          python - <<'PY'
          import hashlib
          import json
          import zipfile
          from pathlib import Path

          def sha256(path: Path) -> str:
              return hashlib.sha256(path.read_bytes()).hexdigest()

          zip_path = Path('dist/UKCG-CDT-Flora-Blueprint-v1.0.zip')
          asset_dir = Path('dist/uk-government-blueprint-assets')
          with zipfile.ZipFile(zip_path) as zf:
              manifest = json.loads(zf.read('blueprint_manifest.json'))
          for entry in manifest['files']:
              asset = asset_dir / entry['path']
              expected = entry['sha256']
              actual = sha256(asset)
              if actual != expected:
                  raise SystemExit(f"Hash mismatch for {entry['path']}: {actual} != {expected}")
          print(f"Verified {len(manifest['files'])} manifest file hashes")
          PY

      - name: Run Blueprint and Flora validation tests
        run: |
          pytest tests/blueprints/test_ukcg_materialisation.py tests/test_flora_blueprint_import_validation.py

      - name: Run isolated Flora receipt and staged validation
        run: |
          FLORA_DATA_DIR="$RUNNER_TEMP/flora-ukcg-validation" python - <<'PY'
          from pathlib import Path
          from cios.applications.flora.blueprint_import import BlueprintPackageRegistry, BlueprintPackageValidator

          zip_path = Path('dist/UKCG-CDT-Flora-Blueprint-v1.0.zip')
          receipt = BlueprintPackageRegistry().receive(zip_path.read_bytes(), zip_path.name, 'github-actions')
          result = BlueprintPackageValidator().validate_and_stage(receipt.package_ref, 'github-actions')
          expected = {
              'candidate_records_staged': 152,
              'records_accepted_into_staging': 116,
              'records_quarantined': 36,
              'records_rejected': 0,
              'canonical_mutations': 0,
          }
          actual = {name: getattr(result, name) for name in expected}
          if actual != expected:
              raise SystemExit(f"Unexpected staged validation counts: {actual} != {expected}")
          print(actual)
          PY

      - name: Upload workflow artefacts
        uses: actions/upload-artifact@v4
        with:
          name: UKCG-CDT-Flora-Blueprint-v1.0
          path: |
            dist/UKCG-CDT-Flora-Blueprint-v1.0.zip
            dist/uk-government-blueprint-assets/**
          if-no-files-found: error
          retention-days: 30
