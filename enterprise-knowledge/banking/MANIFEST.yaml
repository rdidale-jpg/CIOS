domain:
  id: banking
  name: Banking
  status: candidate_reference_domain
  version: "0.1"

purpose:
  - Govern the Banking Enterprise Intelligence knowledge base.
  - Preserve research lineage and discoverability.
  - Support Flora reasoning without treating reports as unqualified facts.

architecture_dependencies:
  - CIOS Chief Architect Handbook
  - CIOS Reference Architecture
  - CIOS-AI
  - EI-001 Enterprise Model Specification
  - EI-002 Enterprise Knowledge Graph
  - EI-003 Enterprise Behaviour Model
  - EI-012 Enterprise Observation Model
  - EI-017 Enterprise Mechanism Model
  - FP-009 Hypothesis Validation Standard

asset_types:
  industry:
    - Banking Industry Foundation
    - Banking Industry Twin
    - Banking Mechanism Catalogue

  enterprise_twins:
    - Lloyds Banking Group
    - NatWest Group
    - Nationwide / Virgin Money
    - Monzo
    - Starling Bank
    - Barclays
    - Santander UK

  infrastructure_twins:
    - UK Banking Payments Infrastructure Twin

  comparisons:
    - Four-Bank Mechanism Differential Matrix v2.1
    - Mechanism Identifier Reconciliation Register
    - Participant-Type Variant Register
    - Enterprise-Specific Mechanism Candidate Register
    - Compound Mechanism Register

governance:
  canonical_mechanism_authority: Banking Mechanism Catalogue
  preserve_unknowns: true
  preserve_contradictions: true
  require_evidence_lineage: true
  distinguish_human_supplied_knowledge: true
  separate_mechanism_confidence_from_enterprise_applicability: true
  quarantine_commercial_opportunity_material_from_mechanism_validation: true

flora:
  discovery_register: flora/Banking-Knowledge-Register.md
  machine_manifest: flora/Banking-Knowledge-Manifest.json
  ingest_full_documents_automatically: false
  require_governed_registration: true

known_gaps:
  - Final filenames and repository paths for research artefacts remain pending upload.
  - Some Twins remain Foundation or Candidate assets rather than Accepted models.
  - Ecosystem Twin is not yet validated as a formal Twin type.
  - Mechanism Mapping Model has not yet been promoted into an accepted EI paper.
