services:
  - type: web
    name: flora
    runtime: python
    plan: standard
    buildCommand: pip install -r requirements.txt
    startCommand: python -m cios.applications.flora.web.app
    envVars:
      - key: FLORA_HOST
        value: 0.0.0.0
      - key: FLORA_PILOT_AUTH_ENABLED
        value: "1"
      - key: FLORA_TRUST_PROXY_HEADERS
        value: "0"
      - key: FLORA_PILOT_SESSION_DAYS
        value: "30"
      # Configure FLORA_PILOT_ACCESS_SECRET, FLORA_PILOT_OWNER_ID, FLORA_PILOT_WORKSPACE, and FLORA_PILOT_ROLE in the Render dashboard. Do not commit secret values.
      - key: FLORA_DATA_DIR
        value: /var/data/flora
      - key: FLORA_RAPID_AI_TWIN_ENABLED
        value: "true"
      - key: OPENAI_API_KEY
        sync: false
    disk:
      name: flora-pilot-memory
      mountPath: /var/data/flora
      sizeGB: 1
